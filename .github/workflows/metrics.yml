# İstatistik ve başarım SVG'lerini repo içinde üretir; dış kart servislerinin
# (github-readme-stats 503, profile-trophy 402) kota sorunlarından etkilenmez.
name: generate metrics

on:
  schedule:
    - cron: "30 3 * * *" # her gün 03:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # İstatistikler + en çok kullanılan diller (tek kart)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: berkayyalcin7
          filename: github-metrics.svg
          config_timezone: Europe/Istanbul
          base: header, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
