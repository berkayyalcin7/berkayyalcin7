# Katkı grafiğinden yılan animasyonu üretir; README 'output' branch'indeki SVG'yi gösterir.
name: generate contribution snake

on:
  schedule:
    - cron: "0 3 * * *" # her gün 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: berkayyalcin7
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
